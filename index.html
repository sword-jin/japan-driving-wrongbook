<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本驾考错题本</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap');

  :root {
    --red: #e03131;
    --red-light: #fff5f5;
    --red-border: #ffc9c9;
    --ink: #1a1a2e;
    --ink-mid: #4a4a6a;
    --ink-light: #9090aa;
    --paper: #faf9f7;
    --paper-warm: #f4f1eb;
    --accent: #c92a2a;
    --green: #2f9e44;
    --green-light: #ebfbee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* Header */
  header {
    background: var(--ink);
    color: white;
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '試験';
    position: absolute;
    right: -10px;
    top: -10px;
    font-family: 'Noto Serif SC', serif;
    font-size: 100px;
    color: rgba(255,255,255,0.05);
    line-height: 1;
    pointer-events: none;
  }
  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  header p {
    margin-top: 4px;
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.03em;
  }
  .stats {
    display: flex;
    gap: 20px;
    margin-top: 18px;
  }
  .stat {
    background: rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 8px 14px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    color: #ff8787;
  }
  .stat-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* Filter bar */
  .filter-bar {
    padding: 14px 20px;
    display: flex;
    gap: 8px;
    background: var(--paper-warm);
    border-bottom: 1px solid #e8e5df;
    overflow-x: auto;
  }
  .filter-btn {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid #d0ccc4;
    background: white;
    font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  /* Cards */
  .cards {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 680px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid #ece9e1;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px 10px;
    border-bottom: 1px solid #f2efe8;
  }
  .card-num {
    display: none;
  }
  .stars {
    display: flex;
    gap: 2px;
    margin-left: auto;
  }
  .star {
    font-size: 14px;
    color: #ddd;
    cursor: pointer;
    transition: color 0.15s;
    line-height: 1;
  }
  .star.filled { color: #f59f00; }
  .star:hover { color: #f59f00; }
  .card-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag-signal { background: #fff3bf; color: #866800; }
  .tag-parking { background: #e3fafc; color: #0c6b73; }
  .tag-pedestrian { background: #f3d9fa; color: #6b2a82; }

  .card-body {
    padding: 14px 16px;
  }
  .question-text {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink);
  }

  .card-answer {
    padding: 12px 16px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .card-answer.wrong {
    background: var(--red-light);
    border-top: 1px solid var(--red-border);
  }
  .answer-icon {
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .answer-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--accent);
    font-weight: 500;
  }

  .card-footer {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid #f2efe8;
  }

  .reveal-btn {
    font-size: 12px;
    color: white;
    background: var(--ink);
    border: none;
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: opacity 0.2s;
  }
  .reveal-btn:hover { opacity: 0.8; }

  .mastered-btn {
    font-size: 12px;
    color: var(--ink-light);
    background: none;
    border: 1.5px solid #e0ddd5;
    border-radius: 20px;
    padding: 4px 12px;
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }
  .mastered-btn.done {
    background: var(--green-light);
    border-color: #8ce99a;
    color: var(--green);
  }
  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-light);
    font-size: 14px;
  }


  /* Quiz overlay */
  #quizOverlay {
    display: none; position: fixed; inset: 0;
    background: var(--ink); z-index: 100;
    flex-direction: column;
  }
  #quizOverlay.active { display: flex; }

  .quiz-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .quiz-title { font-family: "Noto Serif SC", serif; font-size: 15px; color: white; letter-spacing: 0.05em; }
  .quiz-close {
    background: rgba(255,255,255,0.1); border: none; color: white;
    font-size: 18px; width: 34px; height: 34px; border-radius: 50%;
    cursor: pointer;
  }
  .quiz-progress-bar { height: 3px; background: rgba(255,255,255,0.1); flex-shrink: 0; }
  .quiz-progress-fill { height: 100%; background: #ff8787; transition: width 0.4s ease; }

  .quiz-body {
    flex: 1; overflow-y: auto;
    display: flex; flex-direction: column;
    align-items: center; padding: 28px 20px 20px;
  }
  .quiz-counter { font-size: 12px; color: rgba(255,255,255,0.4); letter-spacing: 0.1em; margin-bottom: 16px; }
  .quiz-stars { display: flex; gap: 4px; margin-bottom: 14px; }
  .quiz-stars .qs { font-size: 15px; color: rgba(255,255,255,0.2); }
  .quiz-stars .qs.filled { color: #f59f00; }

  .quiz-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px; width: 100%; max-width: 500px; overflow: hidden; margin-bottom: 20px;
  }
  .quiz-question-wrap { padding: 26px 22px 22px; }
  .quiz-tag-label {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55);
    display: inline-block; margin-bottom: 14px;
  }
  .quiz-question-wrap img { width: 100%; max-width: 150px; border-radius: 8px; margin-bottom: 14px; display: block; }
  .quiz-q-text { font-size: 16px; line-height: 1.8; color: white; font-weight: 500; }

  .quiz-feedback {
    overflow: hidden; max-height: 0; transition: max-height 0.35s ease;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .quiz-feedback.show { max-height: 300px; }
  .quiz-feedback-inner {
    padding: 18px 22px; display: flex; gap: 12px; align-items: flex-start;
  }
  .quiz-feedback.correct-fb .quiz-feedback-inner { background: rgba(47,158,68,0.15); }
  .quiz-feedback.wrong-fb .quiz-feedback-inner { background: rgba(224,49,49,0.13); }
  .fb-icon { font-size: 22px; flex-shrink: 0; line-height: 1.4; }
  .fb-right { display: flex; flex-direction: column; gap: 4px; }
  .fb-verdict { font-size: 14px; font-weight: 700; }
  .quiz-feedback.correct-fb .fb-verdict { color: #69db7c; }
  .quiz-feedback.wrong-fb .fb-verdict { color: #ff8787; }
  .fb-explanation { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.6; }

  .quiz-answer-btns {
    display: flex; gap: 12px; width: 100%; max-width: 500px; margin-bottom: 14px;
  }
  .btn-choice {
    flex: 1; padding: 18px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15);
    background: transparent; font-size: 28px; cursor: pointer;
    transition: all 0.18s; color: white;
  }
  .btn-choice:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.3); }
  .btn-choice.selected-correct { border-color: #69db7c; background: rgba(47,158,68,0.15); }
  .btn-choice.selected-wrong { border-color: #ff8787; background: rgba(224,49,49,0.13); }
  .btn-choice:disabled { cursor: default; }

  .btn-next {
    width: 100%; max-width: 500px; padding: 14px; border-radius: 12px;
    border: none; background: white; color: var(--ink);
    font-size: 15px; font-weight: 700; font-family: "Noto Sans SC", sans-serif;
    cursor: pointer; display: none;
  }
  .btn-next.visible { display: block; }

  .quiz-complete {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 40px 24px; text-align: center;
  }
  .quiz-complete.active { display: flex; }
  .qc-icon { font-size: 64px; margin-bottom: 16px; }
  .qc-score { font-family: "Noto Serif SC", serif; font-size: 52px; color: #69db7c; margin-bottom: 6px; }
  .qc-title { font-family: "Noto Serif SC", serif; font-size: 20px; color: white; margin-bottom: 8px; }
  .qc-detail { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 32px; }
  .btn-again {
    padding: 13px 32px; border-radius: 12px; border: none;
    background: white; color: var(--ink); font-size: 14px; font-weight: 700;
    font-family: "Noto Sans SC", sans-serif; cursor: pointer;
  }

</style>
</head>
<body>

<header>
  <h1>日本驾考 · 错题本</h1>
  <p>平安自動車学校 · 2026</p>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="totalCount">27</div>
      <div class="stat-label">错题总数</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="masteredCount" style="color:#69db7c">0</div>
      <div class="stat-label">已掌握</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="remainCount" style="color:#ff8787">3</div>
      <div class="stat-label">待复习</div>
    </div>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterCards('all', this)">全部</button>
  <button class="filter-btn" onclick="filterCards('pending', this)">待复习</button>
  <button class="filter-btn" onclick="filterCards('mastered', this)">已掌握</button>
  <button class="filter-btn" style="margin-left:auto;background:var(--ink);color:white;border-color:var(--ink)" onclick="startQuiz()">⚡ 做题</button>
</div>

<div class="cards" id="cardsContainer">

</div>

<script src="cards.js"></script>
<script>

  function revealCardAnswer(btn) {
    const card = btn.closest('.card');
    card.querySelector('.card-answer').style.display = 'flex';
    btn.style.display = 'none';
    card.querySelector('.mastered-btn').style.display = 'block';
  }

  function toggleMastered(btn) {
    const card = btn.closest('.card');
    const isMastered = card.dataset.mastered === 'true';
    card.dataset.mastered = !isMastered;
    if (!isMastered) {
      btn.textContent = '✓ 已掌握';
      btn.classList.add('done');
    } else {
      btn.textContent = '✓ 标记已掌握';
      btn.classList.remove('done');
    }
    updateStats();
  }

  function filterCards(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.card').forEach(card => {
      const mastered = card.dataset.mastered === 'true';
      if (type === 'all') card.style.display = '';
      else if (type === 'mastered') card.style.display = mastered ? '' : 'none';
      else if (type === 'pending') card.style.display = mastered ? 'none' : '';
    });
  }

  function setStars(container, e) {
    const stars = container.querySelectorAll('.star');
    const clicked = e.target.closest('.star');
    if (!clicked) return;
    const idx = [...stars].indexOf(clicked);
    stars.forEach((s, i) => s.classList.toggle('filled', i <= idx));
  }

  function updateStats() {
    const cards = document.querySelectorAll('.card');
    const mastered = [...cards].filter(c => c.dataset.mastered === 'true').length;
    document.getElementById('totalCount').textContent = cards.length;
    document.getElementById('masteredCount').textContent = mastered;
    document.getElementById('remainCount').textContent = cards.length - mastered;
  }


  // ---- Quiz Mode ----
  let quizCards = [], quizIndex = 0, quizCorrect = 0;

  function startQuiz() {
    quizCards = [...document.querySelectorAll('#cardsContainer .card')]
      .sort(() => Math.random() - 0.5);
    quizIndex = 0; quizCorrect = 0;
    document.getElementById('quizComplete').classList.remove('active');
    document.getElementById('quizBody').style.display = 'flex';
    document.getElementById('quizOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    showQuizCard();
  }

  function closeQuiz() {
    document.getElementById('quizOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  function showQuizCard() {
    if (quizIndex >= quizCards.length) {
      document.getElementById('quizBody').style.display = 'none';
      document.getElementById('quizComplete').classList.add('active');
      document.getElementById('qcScore').textContent = quizCorrect + '/' + quizCards.length;
      document.getElementById('qcDetail').textContent =
        '答对 ' + quizCorrect + ' 题，答错 ' + (quizCards.length - quizCorrect) + ' 题';
      return;
    }
    const card = quizCards[quizIndex];
    const total = quizCards.length;

    document.getElementById('quizFill').style.width = (quizIndex / total * 100) + '%';
    document.getElementById('quizCounter').textContent = (quizIndex + 1) + ' / ' + total;

    // Stars
    const starsEl = [...card.querySelectorAll('.stars .star')];
    document.getElementById('quizStars').innerHTML = starsEl.map(s =>
      '<span class="qs' + (s.classList.contains('filled') ? ' filled' : '') + '">★</span>'
    ).join('');

    // Tag
    const tag = card.querySelector('.card-tag');
    document.getElementById('quizTagLabel').textContent = tag ? tag.textContent : '';

    // Image
    const img = card.querySelector('.card-body img');
    document.getElementById('quizImgWrap').innerHTML = img
      ? '<img src="' + img.src + '">' : '';

    // Question
    document.getElementById('quizQText').textContent =
      card.querySelector('.question-text').textContent;

    // Reset UI
    const fb = document.getElementById('quizFeedback');
    fb.classList.remove('show', 'correct-fb', 'wrong-fb');
    document.getElementById('btnMaru').className = 'btn-choice';
    document.getElementById('btnBatsu').className = 'btn-choice';
    document.getElementById('btnMaru').disabled = false;
    document.getElementById('btnBatsu').disabled = false;
    document.getElementById('btnNext').classList.remove('visible');
  }

  function submitAnswer(answer) {
    const card = quizCards[quizIndex];
    const correct = card.dataset.correct;
    const isCorrect = answer === correct;
    if (isCorrect) quizCorrect++;

    // Style chosen button
    const chosenBtn = answer === '○'
      ? document.getElementById('btnMaru')
      : document.getElementById('btnBatsu');
    chosenBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    document.getElementById('btnMaru').disabled = true;
    document.getElementById('btnBatsu').disabled = true;

    // Feedback
    const fb = document.getElementById('quizFeedback');
    fb.classList.add('show', isCorrect ? 'correct-fb' : 'wrong-fb');
    document.getElementById('fbIcon').textContent = isCorrect ? '✓' : '✗';
    document.getElementById('fbVerdict').textContent = isCorrect ? '回答正确！' : '回答错误，正确答案是 ' + correct;
    document.getElementById('fbExplanation').textContent =
      card.querySelector('.answer-text').textContent;

    document.getElementById('btnNext').classList.add('visible');
  }

  function nextQuizCard() {
    quizIndex++;
    showQuizCard();
  }

  renderCards();
  updateStats();

</script>


<!-- Quiz Overlay -->
<div id="quizOverlay">
  <div class="quiz-topbar">
    <span class="quiz-title">做题模式</span>
    <button class="quiz-close" onclick="closeQuiz()">✕</button>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizFill" style="width:0%"></div></div>

  <div class="quiz-body" id="quizBody">
    <div class="quiz-counter" id="quizCounter"></div>
    <div class="quiz-stars" id="quizStars"></div>
    <div class="quiz-card">
      <div class="quiz-question-wrap">
        <span class="quiz-tag-label" id="quizTagLabel"></span>
        <div id="quizImgWrap"></div>
        <p class="quiz-q-text" id="quizQText"></p>
      </div>
      <div class="quiz-feedback" id="quizFeedback">
        <div class="quiz-feedback-inner">
          <span class="fb-icon" id="fbIcon"></span>
          <div class="fb-right">
            <span class="fb-verdict" id="fbVerdict"></span>
            <span class="fb-explanation" id="fbExplanation"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="quiz-answer-btns">
      <button class="btn-choice" id="btnMaru" onclick="submitAnswer('○')">○</button>
      <button class="btn-choice" id="btnBatsu" onclick="submitAnswer('×')">×</button>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuizCard()">次の問題 →</button>
  </div>

  <div class="quiz-complete" id="quizComplete">
    <div class="qc-icon">🎉</div>
    <div class="qc-score" id="qcScore"></div>
    <div class="qc-title">本轮完成！</div>
    <div class="qc-detail" id="qcDetail"></div>
    <button class="btn-again" onclick="startQuiz()">再来一轮</button>
  </div>
</div>

</body>
</html>
